kind = "web"
previewPath = "/"
title = "ERP Inteligente Simplificado"
version = "1.0.0"
id = "artifacts/erp-simplificado"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24102

[services.development]
run = "pnpm --filter @workspace/erp-simplificado run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-simplificado", "run", "build" ]
publicDir = "artifacts/erp-simplificado/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24102"
BASE_PATH = "/"
