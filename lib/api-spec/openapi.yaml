openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ERP Inteligente Simplificado API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: products
    description: Product management
  - name: sales
    description: Sales management
  - name: dashboard
    description: Dashboard summaries
  - name: forecast
    description: AI demand forecasting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List all sales
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Register a sale
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "400":
          description: Bad request (e.g. insufficient stock)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /forecast/{productId}:
    get:
      operationId: getForecast
      tags: [forecast]
      summary: Get forecast for a product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Forecast result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastResult"

  /forecast:
    get:
      operationId: getAllForecasts
      tags: [forecast]
      summary: Get forecasts for all products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All forecasts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForecastResult"

  /alerts:
    get:
      operationId: getAlerts
      tags: [dashboard]
      summary: Get smart alerts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
      required:
        - id
        - name
        - email

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        price:
          type: number
        currentStock:
          type: integer
        minimumStock:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - category
        - price
        - currentStock
        - minimumStock
        - createdAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        currentStock:
          type: integer
        minimumStock:
          type: integer
      required:
        - name
        - category
        - price
        - currentStock
        - minimumStock

    Sale:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        saleDate:
          type: string
        totalValue:
          type: number
      required:
        - id
        - productId
        - productName
        - quantity
        - saleDate
        - totalValue

    CreateSaleBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        saleDate:
          type: string
      required:
        - productId
        - quantity

    DashboardData:
      type: object
      properties:
        totalProducts:
          type: integer
        salesToday:
          type: integer
        salesTodayValue:
          type: number
        lowStockCount:
          type: integer
        topProduct:
          type: string
        forecastTomorrow:
          type: integer
        weeklySales:
          type: array
          items:
            $ref: "#/components/schemas/WeeklySalePoint"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/TopProductPoint"
        stockEvolution:
          type: array
          items:
            $ref: "#/components/schemas/StockEvolutionPoint"
      required:
        - totalProducts
        - salesToday
        - salesTodayValue
        - lowStockCount
        - topProduct
        - forecastTomorrow
        - weeklySales
        - topProducts
        - stockEvolution

    WeeklySalePoint:
      type: object
      properties:
        day:
          type: string
        quantity:
          type: integer
        value:
          type: number
      required:
        - day
        - quantity
        - value

    TopProductPoint:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
      required:
        - name
        - quantity

    StockEvolutionPoint:
      type: object
      properties:
        date:
          type: string
        stock:
          type: integer
        productName:
          type: string
      required:
        - date
        - stock
        - productName

    ForecastResult:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        forecastQuantity:
          type: integer
        currentStock:
          type: integer
        minimumStock:
          type: integer
        suggestedPurchase:
          type: integer
        confidence:
          type: number
        trend:
          type: string
      required:
        - productId
        - productName
        - forecastQuantity
        - currentStock
        - minimumStock
        - suggestedPurchase
        - confidence
        - trend

    Alert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [critical_stock, high_demand, idle_product, restock_needed]
        productId:
          type: integer
        productName:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
      required:
        - id
        - type
        - productId
        - productName
        - message
        - severity
